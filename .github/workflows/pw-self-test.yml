name: pw-self-test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  browsers:
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skills/shared/pw-playwright-fieldkit/scripts/package-lock.json
      - working-directory: skills/shared/pw-playwright-fieldkit/scripts
        run: npm ci
      - working-directory: skills/shared/pw-playwright-fieldkit/scripts
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - working-directory: skills/shared/pw-playwright-fieldkit/scripts
        env:
          TEST_BROWSER: ${{ matrix.browser }}
        run: npm test

  generated-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skills/shared/pw-playwright-fieldkit/scripts/package-lock.json
      - working-directory: skills/shared/pw-playwright-fieldkit/scripts
        run: npm ci
      - working-directory: skills/shared/pw-playwright-fieldkit/scripts
        run: npm install --no-save --package-lock=false @playwright/test@1.61.1
      - working-directory: skills/shared/pw-playwright-fieldkit/scripts
        run: npx playwright install --with-deps chromium
      - working-directory: skills/shared/pw-playwright-fieldkit/scripts
        run: npm run test:generated

  generated-python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skills/shared/pw-playwright-fieldkit/scripts/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - working-directory: skills/shared/pw-playwright-fieldkit/scripts
        run: npm ci
      - working-directory: skills/shared/pw-playwright-fieldkit/scripts
        run: npx playwright install chromium
      - run: python -m pip install pytest pytest-playwright==0.8.0 playwright==1.61.0
      - run: python -m playwright install --with-deps chromium
      - working-directory: skills/shared/pw-playwright-fieldkit/scripts
        run: npm run test:generated:python
