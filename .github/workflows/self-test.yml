name: self-test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  browsers:
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: .cline/skills/playwright-fieldkit/scripts/package-lock.json
      - working-directory: .cline/skills/playwright-fieldkit/scripts
        run: npm ci
      - working-directory: .cline/skills/playwright-fieldkit/scripts
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - working-directory: .cline/skills/playwright-fieldkit/scripts
        env:
          TEST_BROWSER: ${{ matrix.browser }}
        run: npm test

  generated-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: .cline/skills/playwright-fieldkit/scripts/package-lock.json
      - working-directory: .cline/skills/playwright-fieldkit/scripts
        run: npm ci
      - working-directory: .cline/skills/playwright-fieldkit/scripts
        run: npm install --no-save --package-lock=false @playwright/test@1.61.1
      - working-directory: .cline/skills/playwright-fieldkit/scripts
        run: npx playwright install --with-deps chromium
      - working-directory: .cline/skills/playwright-fieldkit/scripts
        run: npm run test:generated

  generated-python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: .cline/skills/playwright-fieldkit/scripts/package-lock.json
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - working-directory: .cline/skills/playwright-fieldkit/scripts
        run: npm ci
      - working-directory: .cline/skills/playwright-fieldkit/scripts
        run: npx playwright install chromium
      - run: python -m pip install pytest pytest-playwright==0.8.0 playwright==1.61.0
      - run: python -m playwright install --with-deps chromium
      - working-directory: .cline/skills/playwright-fieldkit/scripts
        run: npm run test:generated:python
